server {
    listen 80;
    listen [::]:80;

    # Replace with your server's IP address or hostname
    server_name localhost;

    # Document root - Laravel's public directory
    root C:/www/project/amla_report/public;

    # Add index.php to the list
    index index.php index.html index.htm;

    # Charset
    charset utf-8;

    # Logging
    access_log C:/www/project/amla_report/storage/logs/nginx-access.log;
    error_log C:/www/project/amla_report/storage/logs/nginx-error.log;

    # Main location block
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM Configuration
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # Replace with your PHP-CGI port (usually 9000 or 9123)
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Increase timeouts for large operations
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # Deny access to hidden files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Disable access to sensitive files
    location ~ /\.ht {
        deny all;
    }

    location ~ /\.git {
        deny all;
    }

    # Client body size limit (for file uploads)
    client_max_body_size 50M;
}
